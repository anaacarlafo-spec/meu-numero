<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Número</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-home">

  <!-- Config injetada pelo Vercel via meta tags -->
  <!-- Os valores abaixo são substituídos por variáveis de ambiente no vercel.json -->
  <meta name="supabase-url"  content="__SUPABASE_URL__">
  <meta name="supabase-key" content="__SUPABASE_ANON_KEY__">

  <main class="home-container">
    <div class="creator-card">

      <div class="creator-photo-wrap">
        <img
          id="creatorPhoto"
          src="https://picsum.photos/seed/criadora/480/480"
          alt="Foto da criadora"
          width="200" height="200"
          loading="eager"
          class="creator-photo"
        >
        <span id="statusDot" class="status-dot offline"></span>
      </div>

      <h1 id="creatorName" class="creator-name">Carregando...</h1>
      <p id="statusLabel" class="status-label offline-text">Offline agora</p>

      <button id="callBtn" class="btn-call" disabled aria-label="Ligar por videochamada">
        Ligar por videochamada
      </button>

      <p id="callHint" class="call-hint">A criadora está offline no momento.</p>

      <a href="criadora.html" class="link-criadora">Área da criadora</a>
    </div>
  </main>

  <!-- Tela de chamada -->
  <div id="callScreen" class="call-screen hidden" role="dialog" aria-modal="true" aria-label="Videochamada em andamento">
    <div class="call-videos">
      <video id="remoteVideo" autoplay playsinline class="video-remote" aria-label="Vídeo remoto"></video>
      <video id="localVideo"  autoplay playsinline muted class="video-local"  aria-label="Seu vídeo"></video>
    </div>
    <div class="call-controls">
      <button id="endCallBtn" class="btn-end-call" aria-label="Encerrar chamada">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 4.26 9.6a19.79 19.79 0 0 1-3.07-8.68A2 2 0 0 1 3.17 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.17 7.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        Encerrar
      </button>
    </div>
    <p id="callStatusMsg" class="call-status-msg">Conectando...</p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
