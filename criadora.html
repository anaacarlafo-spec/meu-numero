<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel da Criadora — Meu Número</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C9A84C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meu Número">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-criadora">

  <!-- Login -->
  <div id="loginScreen" class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">Meu Número</h1>
      <p class="auth-subtitle">Área da criadora</p>
      <form id="loginForm" class="auth-form" novalidate>
        <label for="loginEmail" class="form-label">E-mail</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com" required autocomplete="email">

        <label for="loginPassword" class="form-label">Senha</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">

        <p id="loginError" class="form-error hidden" role="alert"></p>
        <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <!-- Painel -->
  <div id="dashboardScreen" class="dashboard hidden">
    <header class="dash-header">
      <span class="dash-logo">Meu Número</span>
      <div class="dash-header-actions">
        <a href="index.html" class="btn-ghost" target="_blank" rel="noopener noreferrer" aria-label="Ver página pública">Ver minha página</a>
        <button id="logoutBtn" class="btn-ghost" aria-label="Sair da conta">Sair</button>
      </div>
    </header>

    <!-- Banner de chamada recebida -->
    <div id="incomingSection" class="incoming-banner hidden" role="alert" aria-live="assertive">
      <div class="incoming-banner-inner">
        <div class="incoming-banner-info">
          <span class="incoming-banner-icon" aria-hidden="true">📞</span>
          <div>
            <p class="incoming-banner-title">Chamada recebida</p>
            <p class="incoming-banner-sub">Um cliente está ligando para você!</p>
          </div>
        </div>
        <div class="incoming-banner-actions">
          <button id="acceptCallBtn" class="btn-accept">Atender</button>
          <button id="rejectCallBtn" class="btn-reject">Recusar</button>
        </div>
      </div>
    </div>

    <main class="dash-main">

      <!-- Banner notificação push -->
      <div id="notifBanner" class="notif-banner hidden">
        <p>🔔 Ative as notificações para receber chamadas mesmo com o app minimizado.</p>
        <button id="notifBtn" class="btn-primary">Ativar notificações</button>
      </div>

      <section class="dash-section">
        <h2 class="dash-section-title">Sua disponibilidade</h2>
        <div class="status-toggle">
          <button id="btnOnline"  class="btn-status" data-status="online"  aria-pressed="false">Online</button>
          <button id="btnOffline" class="btn-status active" data-status="offline" aria-pressed="true">Offline</button>
        </div>
        <p id="statusFeedback" class="status-feedback">Você está offline.</p>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Sua foto</h2>
        <div class="photo-edit">
          <img id="dashPhoto" src="https://picsum.photos/seed/criadora/200/200" alt="Foto atual da criadora" width="80" height="80" class="dash-photo">
          <div class="photo-actions">
            <label for="photoInput" class="btn-secondary" role="button" tabindex="0">
              Alterar foto
              <input type="file" id="photoInput" accept="image/*" class="sr-only" aria-label="Selecionar nova foto">
            </label>
            <p class="photo-hint">JPG, PNG ou WebP</p>
          </div>
        </div>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Seu nome</h2>
        <div class="name-edit">
          <input type="text" id="nameInput" class="form-input" placeholder="Seu nome público" maxlength="40" aria-label="Nome exibido na página pública">
          <button id="saveNameBtn" class="btn-primary">Salvar</button>
        </div>
        <p id="nameFeedback" class="status-feedback hidden"></p>
      </section>

    </main>
  </div>

  <!-- Tela de chamada -->
  <div id="callScreen" class="call-screen hidden" role="dialog" aria-modal="true" aria-label="Videochamada em andamento">
    <div class="call-videos">
      <video id="remoteVideo" autoplay playsinline class="video-remote" aria-label="Vídeo do cliente"></video>
      <video id="localVideo"  autoplay playsinline muted class="video-local"  aria-label="Seu vídeo"></video>
    </div>
    <div class="call-controls">
      <button id="endCallBtn" class="btn-end-call" aria-label="Encerrar chamada">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 4.26 9.6a19.79 19.79 0 0 1-3.07-8.68A2 2 0 0 1 3.17 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.17 7.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        Encerrar
      </button>
    </div>
    <p id="callStatusMsg" class="call-status-msg">Chamada em andamento</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>

  <script>
    const SUPABASE_URL = 'https://decuqgobcbuwgkaesbvo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlY3VxZ29iY2J1d2drYWVzYnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTEzMTAsImV4cCI6MjA5MDg4NzMxMH0.DbMHj0K36zwOqdfo_y1q3R7HJKHkTzHn2j-BIJIkkiQ';
    const { createClient } = supabase;
    const sbPush = createClient(SUPABASE_URL, SUPABASE_KEY);

    // VAPID public key — substitua após gerar em vapidkeys.com
    const VAPID_PUBLIC_KEY = 'COLE_AQUI_SUA_CHAVE_PUBLICA_VAPID';

    let swReg = null;

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    async function registerSW() {
      if (!('serviceWorker' in navigator)) return;
      try {
        swReg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
        await navigator.serviceWorker.ready;
      } catch (e) { console.warn('SW:', e); }
    }
    registerSW();

    async function subscribePush() {
      if (!swReg) return;
      if (VAPID_PUBLIC_KEY === 'COLE_AQUI_SUA_CHAVE_PUBLICA_VAPID') return;
      try {
        const existing = await swReg.pushManager.getSubscription();
        const sub = existing || await swReg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        // Salva subscription no Supabase (tabela perfil_push)
        await sbPush.from('perfil_push').upsert({
          perfil_id: 1,
          endpoint:  sub.endpoint,
          subscription: sub.toJSON()
        }, { onConflict: 'endpoint' });
      } catch (e) { console.warn('subscribePush:', e); }
    }

    const notifBanner = document.getElementById('notifBanner');
    const notifBtn    = document.getElementById('notifBtn');

    function checkNotifPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') {
        notifBanner.classList.remove('hidden');
      } else {
        notifBanner.classList.add('hidden');
        subscribePush();
      }
    }

    const dashObserver = new MutationObserver(() => {
      const dash = document.getElementById('dashboardScreen');
      if (dash && !dash.classList.contains('hidden')) {
        checkNotifPermission();
        dashObserver.disconnect();
      }
    });
    const dash = document.getElementById('dashboardScreen');
    if (dash) dashObserver.observe(dash, { attributes: true, attributeFilter: ['class'] });

    notifBtn.addEventListener('click', async () => {
      const result = await Notification.requestPermission();
      if (result === 'granted') {
        notifBanner.classList.add('hidden');
        await subscribePush();
      } else {
        notifBtn.textContent = 'Permissão negada — verifique as configurações do Safari';
        notifBtn.disabled = true;
      }
    });

    // Fallback foreground: se app estiver visível, o toque já roda pelo app.js
    window.notifyIncomingCall = function () {
      if (document.visibilityState === 'visible') return;
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'INCOMING_CALL' });
      }
    };
  </script>
</body>
</html>
