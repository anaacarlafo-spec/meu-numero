<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel da Criadora — Meu Número</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-criadora">

  <!-- LOGIN -->
  <div id="loginScreen" class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">Área da Criadora</h1>
      <p class="auth-subtitle">Acesso exclusivo</p>
      <form id="loginForm" class="auth-form">
        <div>
          <label for="loginEmail" class="form-label">E-mail</label>
          <input id="loginEmail" class="form-input" type="email" autocomplete="email" required placeholder="seu@email.com">
        </div>
        <div>
          <label for="loginPassword" class="form-label">Senha</label>
          <input id="loginPassword" class="form-input" type="password" autocomplete="current-password" required placeholder="••••••••">
        </div>
        <p id="loginError" class="form-error hidden">E-mail ou senha incorretos.</p>
        <button id="loginBtn" type="submit" class="btn-primary">Entrar</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardScreen" class="dashboard hidden">

    <header class="dash-header">
      <span class="dash-logo">Meu Número</span>
      <button id="logoutBtn" class="btn-ghost">Sair</button>
    </header>

    <main class="dash-main">

      <section class="dash-section">
        <h2 class="dash-section-title">Foto de perfil</h2>
        <div class="photo-edit">
          <img id="dashPhoto" src="https://picsum.photos/seed/criadora/480/480" alt="Sua foto" width="80" height="80" class="dash-photo">
          <div class="photo-actions">
            <label for="photoInput" class="btn-secondary" style="cursor:pointer;">Trocar foto</label>
            <input id="photoInput" type="file" accept="image/*" class="sr-only">
            <span class="photo-hint">JPG ou PNG até 2MB</span>
          </div>
        </div>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Seu nome</h2>
        <div class="name-edit">
          <input id="nameInput" type="text" class="form-input" placeholder="Seu nome">
          <button id="saveNameBtn" class="btn-primary">Salvar</button>
        </div>
        <p id="nameFeedback" class="form-error hidden" style="color:#4ade80;">Nome salvo!</p>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Status</h2>
        <div class="status-toggle">
          <button id="btnOnline"  class="btn-status" data-status="online">Online</button>
          <button id="btnOffline" class="btn-status active" data-status="offline">Offline</button>
        </div>
        <p id="statusFeedback" class="status-feedback">Você está offline. Clientes não podem ligar.</p>
      </section>

      <!-- Chamada entrante -->
      <div id="incomingSection" class="hidden">
        <div class="incoming-banner">
          <div class="incoming-banner-inner">
            <div class="incoming-banner-info">
              <span class="incoming-banner-icon">📞</span>
              <div>
                <p class="incoming-banner-title">Chamada entrante</p>
                <p class="incoming-banner-sub">Um cliente quer falar com você</p>
              </div>
            </div>
            <div class="incoming-banner-actions">
              <button id="acceptCallBtn" class="btn-accept">Atender</button>
              <button id="rejectCallBtn" class="btn-reject">Recusar</button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Tela de chamada -->
  <div id="callScreen" class="call-screen hidden">
    <div class="call-videos">
      <video id="remoteVideo" autoplay playsinline class="video-remote"></video>
      <video id="localVideo"  autoplay playsinline muted class="video-local"></video>
    </div>
    <div class="call-controls">
      <button id="endCallBtn" class="btn-end-call">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 4.26 9.6a19.79 19.79 0 0 1-3.07-8.68A2 2 0 0 1 3.17 0h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.17 7.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        Encerrar
      </button>
    </div>
    <p id="callStatusMsg" class="call-status-msg">Conectando...</p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
